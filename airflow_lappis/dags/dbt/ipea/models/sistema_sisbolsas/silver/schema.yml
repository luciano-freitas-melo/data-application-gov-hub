version: 2

models:
  - name: bolsistas
    description: >
      Modelo silver de bolsistas do Sisbolsas. Parte de `sisbolsas_tb_bolsista`
      e consolida dados de usuário, seleção/chamada, unidade/UF, projeto,
      programa, modalidade, pagamentos e coordenador.
    meta:
      tags:
        - silver
    columns:
      - name: unidade
        description: Sigla da unidade associada à chamada pública.
      - name: bolsista
        description: Nome do bolsista.
      - name: titulo_projeto
        description: Título do projeto vinculado à chamada pública.
      - name: programa
        description: Programa da chamada pública.
      - name: modalidade
        description: Modalidade da seleção.
      - name: inicio
        description: Data de início da bolsa do bolsista.
      - name: termino
        description: Data de término da bolsa do bolsista.
      - name: atividade
        description: Tipo de atuação da seleção (Presencial ou Não presencial).
      - name: uf_unidade
        description: UF da unidade vinculada à chamada pública.
      - name: valor
        description: Valor pago ao bolsista na folha.
      - name: moeda
        description: Tipo de moeda da chamada pública.
      - name: recurso
        description: Fonte financeira utilizada no pagamento.
      - name: coordenador
        description: Coordenador(es) associado(s) à bolsa/chamada.
      - name: mes_referencia
        description: Mês de referência do pagamento (primeiro dia do mês).
      - name: mes_referencia_numero
        description: Número do mês de referência do pagamento.
      - name: ano_referencia
        description: Ano de referência do pagamento.
      - name: situacao_bolsista
        description: Situação do bolsista conforme `co_situacao_bolsista`.

  - name: bolsistas_diversidade
    description: >
      Indicadores de diversidade de bolsistas por unidade (sigla), com totais,
      percentuais e metas mínimas de participação de mulheres (40%) e negros (30%).
    meta:
      tags:
        - silver
    columns:
      - name: unidade
        description: Sigla da unidade (ou `SEM_UNIDADE` quando não há vínculo).
      - name: total_bolsistas
        description: Total de bolsistas distintos na unidade.
      - name: total_mulheres
        description: Total de bolsistas mulheres na unidade.
      - name: total_negros
        description: Total de bolsistas negros na unidade (etnia preta ou parda).
      - name: percentual_mulheres
        description: Percentual de mulheres sobre o total de bolsistas da unidade.
      - name: percentual_negros
        description: Percentual de negros sobre o total de bolsistas da unidade.
      - name: meta_minima_mulheres_40
        description: Quantidade mínima de mulheres para atingir 40% do total da unidade.
      - name: meta_minima_negros_30
        description: Quantidade mínima de negros para atingir 30% do total da unidade.
      - name: mulheres_faltantes_meta
        description: Quantidade de mulheres faltantes para atingir a meta mínima de 40%.
      - name: negros_faltantes_meta
        description: Quantidade de negros faltantes para atingir a meta mínima de 30%.

  - name: chamadas_publicas
    description: >
      Modelo silver com uma linha por chamada pública do Sisbolsas, integrando
      dados da chamada, seleções, unidades, fontes de recurso e informações de
      projeto do ipea_pro para apoiar relatórios e filtros por situação.
    meta:
      tags:
        - silver
    columns:
      - name: chamada_id
        description: Identificador da chamada pública (co_chamada_publica).
      - name: processo_sei
        description: Número do processo SEI vinculado à chamada.
      - name: numero_chamada
        description: Número/ano concatenado da chamada pública (nu_chamada_publica/nu_ano).
      - name: ano_chamada
        description: Ano da chamada pública, normalizado a partir de nu_ano.
      - name: numero_chamada_ano
        description: Número/ano concatenado da chamada pública.
      - name: descricao_chamada
        description: Descrição ou título da chamada pública.
      - name: tipo_chamada
        description: Tipo da chamada pública baseado no programa (ds_programa).
      - name: programa_id
        description: Identificador do programa da chamada pública.
      - name: situacao_chamada
        description: Situação textual da chamada pública.
      - name: situacao_chamada_id
        description: Código da situação da chamada pública.
      - name: projeto_id
        description: Identificador do projeto associado à chamada pública.
      - name: projeto_titulo
        description: Título do projeto no ipea_pro.
      - name: projeto_numero
        description: Número do projeto no ipea_pro.
      - name: projeto_ano
        description: Ano do projeto no ipea_pro.
      - name: diretoria
        description: Nome da diretoria do projeto.
      - name: diretoria_sigla
        description: Sigla da diretoria do projeto.
      - name: coordenador
        description: Coordenador consolidado (projeto ou chamada).
      - name: coordenador_chamada
        description: Coordenadores cadastrados na chamada pública.
      - name: coordenador_projeto
        description: Coordenador do projeto no ipea_pro.
      - name: status_projeto
        description: Status do projeto no ipea_pro.
      - name: unidades_sigla
        description: Siglas das unidades vinculadas à chamada pública.
      - name: unidades_nome
        description: Nomes das unidades vinculadas à chamada pública.
      - name: ufs
        description: UFs das unidades vinculadas à chamada pública.
      - name: modalidades
        description: Modalidades agregadas das seleções da chamada.
      - name: total_selecoes
        description: Quantidade de seleções vinculadas à chamada pública.
      - name: prazo_meses
        description: Maior duração (em meses) registrada nas seleções da chamada.
      - name: inicio_pesquisa
        description: Data de início da pesquisa informada na chamada pública.
      - name: fim_pesquisa
        description: Data de término da pesquisa informada na chamada pública.
      - name: prazo_pesquisa_dias
        description: Diferença em dias entre início e término da pesquisa.
      - name: inicio_inscricao
        description: Data de início da inscrição da chamada pública.
      - name: fim_inscricao
        description: Data de término da inscrição da chamada pública.
      - name: inicio_julgamento
        description: Data de início do julgamento da chamada pública.
      - name: fim_julgamento
        description: Data de término do julgamento da chamada pública.
      - name: publicacao_dou
        description: Data de publicação no DOU da chamada pública.
      - name: previsao_resultado
        description: Data de previsão do resultado da chamada pública.
      - name: publicacao_resultado
        description: Data de publicação do resultado da chamada pública.
      - name: inicio_previsao_bolsa
        description: Data de previsão de início das bolsas.
      - name: inicio_bolsa
        description: Data de início das bolsas da chamada pública.
      - name: inicio_recurso
        description: Data de início do período de recurso da chamada pública.
      - name: fim_recurso
        description: Data de término do período de recurso da chamada pública.
      - name: data_criacao
        description: Data de criação do registro da chamada pública.
      - name: moeda
        description: Moeda indicada para a chamada pública.
      - name: valor_total_chamada
        description: Valor total consolidado da chamada pública.
      - name: valor_global_estimado
        description: Valor global estimado registrado na chamada pública.
      - name: valor_total_selecoes
        description: Soma do valor total das seleções vinculadas à chamada.
      - name: valor_total_fontes_projeto
        description: Soma do valor total das fontes do projeto no ipea_pro.
      - name: valor_por_ano
        description: Mapa JSON com soma por ano das fontes do projeto.
      - name: fonte_recurso
        description: Fonte de recurso consolidada (Sisbolsas ou ipea_pro).
      - name: fontes_recurso_chamada
        description: Fontes financeiras associadas à chamada pública.
      - name: fontes_recurso_projeto
        description: Fontes financeiras associadas ao projeto no ipea_pro.
      - name: cotas
        description: Total de bolsas/vagas a partir de qt_bolsa das seleções.
      - name: reservas
        description: Classificados sem bolsa ativa (proxy para reservas).
      - name: total_processos
        description: Total de processos seletivos vinculados à chamada.
      - name: total_classificados
        description: Total de processos com in_classificacao verdadeiro.
      - name: total_nao_aptos
        description: Total de processos com in_nao_apto verdadeiro.
      - name: total_bolsas_ativas
        description: Total de processos com bolsa ativa.
      - name: usuario_criacao
        description: Usuário que criou a chamada pública.
