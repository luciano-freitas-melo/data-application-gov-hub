version: 2

models:
  - name: ipea_pro_bolsistas
    description: >
      Tabela bronze com o cadastro de bolsistas do sistema Sisbolsas.
      Reúne dados de identificação pessoal, vínculos administrativos, contatos,
      endereço residencial, referências ao projeto e metadados de autenticação
      existentes na base operacional do `ipea_pro`.
      Nesta camada, as colunas foram tipadas e padronizadas para apoiar análises
      e integrações posteriores.
    meta:
      tags:
        - bronze
    columns:
      - name: bolsistaid
        description: Identificador único do bolsista no Sisbolsas.
      - name: categoriaadicionalbolsistaid
        description: Identificador da categoria adicional associada ao bolsista.
      - name: nomebolsista
        description: Nome completo do bolsista.
      - name: datanascimento
        description: Data de nascimento do bolsista.
      - name: numerocpf
        description: CPF do bolsista, padronizado apenas com dígitos.
      - name: numerorg
        description: Número do documento de RG do bolsista.
      - name: expedidorrg
        description: Órgão expedidor do RG do bolsista.
      - name: coordenadorid
        description: Identificador do coordenador associado ao bolsista.
      - name: diretoriaid
        description: Identificador da diretoria vinculada ao bolsista.
      - name: coordenacaoid
        description: Identificador da coordenação vinculada ao bolsista.
      - name: unidadeipeaid
        description: Identificador da unidade do IPEA associada ao bolsista.
      - name: email1
        description: Endereço de e-mail principal do bolsista.
      - name: email2
        description: Endereço de e-mail secundário do bolsista.
      - name: email3
        description: Endereço de e-mail adicional do bolsista.
      - name: telefone1
        description: Telefone principal de contato do bolsista.
      - name: telefone2
        description: Telefone secundário de contato do bolsista.
      - name: telefone3
        description: Telefone adicional de contato do bolsista.
      - name: residenciacep
        description: CEP do endereço residencial do bolsista, padronizado apenas com dígitos.
      - name: residenciarua
        description: Nome da rua ou logradouro residencial do bolsista.
      - name: residencianumero
        description: Número do endereço residencial do bolsista.
      - name: residenciacomplemento
        description: Complemento do endereço residencial do bolsista.
      - name: residenciabairro
        description: Bairro do endereço residencial do bolsista.
      - name: bolsistaminicv
        description: Minicurrículo ou resumo curricular do bolsista.
      - name: linktolattes
        description: Link para o currículo Lattes do bolsista.
      - name: ufid
        description: Identificador da unidade federativa associada ao bolsista.
      - name: municipioid
        description: Identificador do município associado ao bolsista.
      - name: bolsadatainicio
        description: Data de início da bolsa do bolsista.
      - name: bolsadatafinalizacao
        description: Data de finalização da bolsa do bolsista.
      - name: categoriabolsistaid
        description: Identificador da categoria principal da bolsa.
      - name: projetoid
        description: Identificador do projeto ao qual o bolsista está vinculado.
      - name: sexoid
        description: Identificador do sexo cadastrado para o bolsista.
      - name: situacaopessoaid
        description: Identificador da situação pessoal do bolsista.
      - name: statuscadastroid
        description: Identificador do status cadastral do bolsista.
      - name: custoemprojetoid
        description: Identificador do custo do bolsista dentro do projeto.
      - name: login
        description: Login de acesso do bolsista no sistema.
      - name: senha
        description: Valor armazenado no campo de senha do cadastro do bolsista.
      - name: usuarioid
        description: Identificador do usuário relacionado ao cadastro do bolsista.
      - name: idnosistemalegado
        description: Identificador do bolsista no sistema legado.
      - name: matriculaipea
        description: Matrícula interna do bolsista no IPEA, quando existente.
      - name: observacoes
        description: Campo livre com observações complementares sobre o bolsista.

  - name: ipea_pro_coordenacoes
    description: >
      Tabela bronze com o cadastro de coordenações do sistema Sisbolsas.
      Contém identificação, nome, sigla, descrição, responsável, vínculo com
      diretoria e indicador de atividade da coordenação.
    meta:
      tags:
        - bronze
    columns:
      - name: coordenacaoid
        description: Identificador único da coordenação.
      - name: coordenacaonome
        description: Nome da coordenação.
      - name: coordenacaosigla
        description: Sigla da coordenação.
      - name: coordenacaodescricao
        description: Descrição textual da coordenação.
      - name: coordenadorid
        description: Identificador do coordenador responsável pela coordenação.
      - name: diretoriaid
        description: Identificador da diretoria à qual a coordenação está vinculada.
      - name: ativa
        description: Indica se a coordenação está ativa no sistema.
      - name: codigosiape
        description: Código SIAPE associado à coordenação, quando informado.

  - name: ipea_pro_custosemprojetos
    description: >
      Tabela bronze com os custos planejados ou registrados em projetos do
      Sisbolsas. Armazena a relação entre projeto, item de custo, quantidade,
      período de vigência e valor específico do custo.
    meta:
      tags:
        - bronze
    columns:
      - name: custoemprojetoid
        description: Identificador único do registro de custo em projeto.
      - name: itemcustoid
        description: Identificador do item de custo associado ao registro.
      - name: quantidadeitemcusto
        description: Quantidade prevista ou registrada do item de custo.
      - name: projetoid
        description: Identificador do projeto ao qual o custo está vinculado.
      - name: descricaoitemcusto
        description: Descrição complementar do item de custo no contexto do projeto.
      - name: datainicial
        description: Data inicial de vigência ou referência do custo no projeto.
      - name: datafinal
        description: Data final de vigência ou referência do custo no projeto.
      - name: custoespecifico
        description: Valor específico do custo registrado para o projeto.

  - name: ipea_pro_diretorias
    description: >
      Tabela bronze com o cadastro de diretorias do sistema Sisbolsas.
      Reúne identificação, nome, sigla, descrição, dirigentes vinculados e
      código SIAPE associado à estrutura administrativa.
    meta:
      tags:
        - bronze
    columns:
      - name: diretoriaid
        description: Identificador único da diretoria.
      - name: diretorianome
        description: Nome da diretoria.
      - name: diretoriasigla
        description: Sigla da diretoria.
      - name: diretoriadescricao
        description: Descrição textual da diretoria.
      - name: diretorid
        description: Identificador do diretor responsável pela diretoria.
      - name: diretoradjuntoid
        description: Identificador do diretor adjunto da diretoria.
      - name: codigosiape
        description: Código SIAPE associado à diretoria, quando disponível.

  - name: ipea_pro_fontesreceitas
    description: >
      Tabela bronze com o cadastro de fontes de receita vinculadas aos projetos
      do Sisbolsas. Contém a referência do projeto, tipo de fonte, descrição,
      valores e intervalo temporal da receita.
    meta:
      tags:
        - bronze
    columns:
      - name: fontereceitaid
        description: Identificador único da fonte de receita.
      - name: projetoid
        description: Identificador do projeto ao qual a fonte de receita está vinculada.
      - name: itemfontereceitaid
        description: Identificador do item de classificação da fonte de receita.
      - name: descricaofonte
        description: Descrição textual da fonte de receita.
      - name: valortotalfonte
        description: Valor total previsto ou registrado para a fonte de receita.
      - name: datainiciofonte
        description: Data de início da vigência da fonte de receita.
      - name: datafinalfonte
        description: Data de término da vigência da fonte de receita.
      - name: valortotalfonte_bkp
        description: Valor total da fonte registrado no campo de backup da base original.

  - name: ipea_pro_grupoentidade
    description: >
      Tabela bronze com o cadastro de grupos de entidade utilizados pelo
      Sisbolsas para classificar registros financeiros ou institucionais.
    meta:
      tags:
        - bronze
    columns:
      - name: grupoentidadeid
        description: Identificador único do grupo de entidade.
      - name: nome
        description: Nome do grupo de entidade.

  - name: ipea_pro_insumofinanceiro
    description: >
      Tabela bronze com o cadastro de insumos financeiros do Sisbolsas.
      Define itens financeiros, unidade de medida, descrição e indicadores sobre
      a existência de valor unitário e quantidade.
    meta:
      tags:
        - bronze
    columns:
      - name: insumofinanceiroid
        description: Identificador único do insumo financeiro.
      - name: item
        description: Nome ou título do item de insumo financeiro.
      - name: unidade
        description: Unidade de medida associada ao insumo financeiro.
      - name: descricao
        description: Descrição detalhada do insumo financeiro.
      - name: possuivalorunitario
        description: Indica se o insumo financeiro possui valor unitário informado.
      - name: possuiquantidade
        description: Indica se o insumo financeiro possui quantidade informada.

  - name: ipea_pro_itemfontereceitas
    description: >
      Tabela bronze com os itens de classificação das fontes de receita do
      Sisbolsas. Serve de apoio para categorizar e descrever os tipos de
      receita utilizados nos projetos.
    meta:
      tags:
        - bronze
    columns:
      - name: itemfontereceitaid
        description: Identificador único do item de fonte de receita.
      - name: nomeitemfontereceita
        description: Nome do item de fonte de receita.
      - name: descricaoitemfontereceita
        description: Descrição detalhada do item de fonte de receita.
      - name: observacao
        description: Observações complementares sobre o item de fonte de receita.

  - name: ipea_pro_itenscustos
    description: >
      Tabela bronze com o cadastro de itens de custo utilizados no Sisbolsas.
      Contém nome, descrição, unidade, valor unitário de referência,
      classificação cadastral, ordenação e indicadores de atividade e padrão.
    meta:
      tags:
        - bronze
    columns:
      - name: itemcustoid
        description: Identificador único do item de custo.
      - name: nomeitem
        description: Nome do item de custo.
      - name: descricaoitem
        description: Descrição detalhada do item de custo.
      - name: unidadeitem
        description: Unidade de medida do item de custo.
      - name: valorunitarioitem
        description: Valor unitário de referência do item de custo.
      - name: statusitemcadastradoid
        description: Identificador do status cadastral do item de custo.
      - name: categoriasitenscustoid
        description: Identificador da categoria do item de custo.
      - name: ordem
        description: Ordem de exibição ou prioridade do item de custo.
      - name: ativo
        description: Indica se o item de custo está ativo no sistema.
      - name: padrao
        description: Indica se o item de custo é considerado padrão.

  - name: ipea_pro_projetos
    description: >
      Tabela bronze com o cadastro de projetos do sistema Sisbolsas.
      Consolida informações de identificação, escopo, justificativa, metodologia,
      datas, responsáveis, situação do projeto, versionamento e indicadores
      gerenciais utilizados na operação do sistema.
    meta:
      tags:
        - bronze
    columns:
      - name: projetoid
        description: Identificador único do projeto.
      - name: categoriaadicionalprojetoid
        description: Identificador da categoria adicional associada ao projeto.
      - name: tituloprojeto
        description: Título do projeto.
      - name: objetivofinalprojeto
        description: Objetivo final declarado para o projeto.
      - name: justificativaprojeto
        description: Justificativa cadastrada para o projeto.
      - name: metodologiaprojeto
        description: Metodologia descrita para execução do projeto.
      - name: cooperacao
        description: Informação textual sobre cooperação relacionada ao projeto.
      - name: datainicio
        description: Data de início do projeto.
      - name: datafim
        description: Data prevista de término do projeto.
      - name: coordenadorid
        description: Identificador do coordenador responsável pelo projeto.
      - name: diretoriaid
        description: Identificador da diretoria vinculada ao projeto.
      - name: coordenacaoid
        description: Identificador da coordenação vinculada ao projeto.
      - name: statusetapaid
        description: Identificador do status da etapa do projeto.
      - name: statusprojetoid
        description: Identificador do status do projeto.
      - name: modalidadeprojetoid
        description: Identificador da modalidade do projeto.
      - name: numeroprojeto
        description: Número formal do projeto.
      - name: numeroprojetonoano
        description: Numeração sequencial do projeto dentro do ano.
      - name: anoprojeto
        description: Ano de referência do projeto.
      - name: usuariocadastranteid
        description: Identificador do usuário que cadastrou o projeto.
      - name: usuarioversaoid
        description: Identificador do usuário responsável pela versão do projeto.
      - name: numeroversao
        description: Número da versão do registro do projeto.
      - name: horaversao
        description: Data e hora de versionamento do registro do projeto.
      - name: projetoexcluido
        description: Indica se o projeto foi marcado como excluído.
      - name: usuarioexcluinteid
        description: Identificador do usuário que realizou a exclusão lógica do projeto.
      - name: rowversion
        description: Controle numérico de versão da linha na base de origem.
      - name: projetoassessoria
        description: Indica se o projeto é classificado como projeto de assessoria.
      - name: projetoestrategico
        description: Indica se o projeto é classificado como estratégico.
      - name: datafimreal
        description: Data real de encerramento do projeto, quando houver.
      - name: statusprojetohistoricoid
        description: Identificador do histórico de status do projeto.
      - name: palavras_chave
        description: Palavras-chave associadas ao projeto.
      - name: planocomunicacao
        description: Plano de comunicação vinculado ao projeto.
      - name: justificativaprojetoestrategico
        description: Justificativa para o enquadramento do projeto como estratégico.
      - name: planejamentofinanceiroativo
        description: Indica se o planejamento financeiro do projeto está ativo.
      - name: projetoprioritario
        description: Indica se o projeto foi marcado como prioritário.

  - name: ipea_pro_registrofinanceiroemprojetos
    description: >
      Tabela bronze com os registros financeiros vinculados aos projetos do
      Sisbolsas. Relaciona projeto, insumo financeiro, grupo de entidade,
      quantidade, valor unitário e descrição da fonte associada.
    meta:
      tags:
        - bronze
    columns:
      - name: registrofinanceiroid
        description: Identificador único do registro financeiro em projeto.
      - name: descricaoinsumo
        description: Descrição do insumo financeiro associado ao registro.
      - name: valorunitarioinsumo
        description: Valor unitário do insumo financeiro no registro.
      - name: grupoentidadeid
        description: Identificador do grupo de entidade associado ao registro.
      - name: insumofinanceiroid
        description: Identificador do insumo financeiro vinculado ao registro.
      - name: projetoid
        description: Identificador do projeto ao qual o registro financeiro pertence.
      - name: quantidadeinsumo
        description: Quantidade do insumo financeiro registrada no projeto.
      - name: descricaofonte
        description: Descrição da fonte de recursos associada ao registro financeiro.

  - name: ipea_pro_servidorespublicos
    description: >
      Tabela bronze com o cadastro de servidores públicos do sistema Sisbolsas.
      Contém identificação pessoal, vínculos organizacionais, informações de
      contato, endereço residencial e de trabalho, custo do servidor e dados de
      autenticação presentes na base operacional.
    meta:
      tags:
        - bronze
    columns:
      - name: servidorpublicoid
        description: Identificador único do servidor público no Sisbolsas.
      - name: categoriaadicionalservidorid
        description: Identificador da categoria adicional associada ao servidor.
      - name: nomeservidor
        description: Nome completo do servidor público.
      - name: datanascimento
        description: Data de nascimento do servidor público.
      - name: numerocpf
        description: CPF do servidor público, padronizado apenas com dígitos.
      - name: numerorg
        description: Número do RG do servidor público.
      - name: expedidorrg
        description: Órgão expedidor do RG do servidor público.
      - name: diretoriaid
        description: Identificador da diretoria vinculada ao servidor.
      - name: coordenacaoid
        description: Identificador da coordenação vinculada ao servidor.
      - name: salarioatual
        description: Valor do salário atual do servidor.
      - name: custodoservidor
        description: Valor do custo total associado ao servidor.
      - name: email1
        description: Endereço de e-mail principal do servidor.
      - name: email2
        description: Endereço de e-mail secundário do servidor.
      - name: email3
        description: Endereço de e-mail adicional do servidor.
      - name: telefone1
        description: Telefone principal de contato do servidor.
      - name: telefone2
        description: Telefone secundário de contato do servidor.
      - name: telefone3
        description: Telefone adicional de contato do servidor.
      - name: unidadeipeaid
        description: Identificador da unidade do IPEA associada ao servidor.
      - name: residenciacep
        description: CEP do endereço residencial do servidor, padronizado apenas com dígitos.
      - name: residenciarua
        description: Rua ou logradouro do endereço residencial do servidor.
      - name: residencianumero
        description: Número do endereço residencial do servidor.
      - name: residenciacomplemento
        description: Complemento do endereço residencial do servidor.
      - name: residenciabairro
        description: Bairro do endereço residencial do servidor.
      - name: servidorminicv
        description: Minicurrículo ou resumo curricular do servidor.
      - name: linktolattes
        description: Link para o currículo Lattes do servidor.
      - name: ufid
        description: Identificador da unidade federativa associada ao servidor.
      - name: municipioid
        description: Identificador do município associado ao servidor.
      - name: dasid
        description: Identificador do DAS ou função comissionada associada ao servidor.
      - name: categoriaid
        description: Identificador da categoria principal do servidor.
      - name: matriculasiape
        description: Matrícula SIAPE do servidor.
      - name: sexoid
        description: Identificador do sexo cadastrado para o servidor.
      - name: statuscadastroid
        description: Identificador do status cadastral do servidor.
      - name: situacaoservidorid
        description: Identificador da situação do servidor no sistema.
      - name: login
        description: Login de acesso do servidor no sistema.
      - name: senha
        description: Valor armazenado no campo de senha do cadastro do servidor.
      - name: usuarioid
        description: Identificador do usuário relacionado ao cadastro do servidor.
      - name: idnosistemalegado
        description: Identificador do servidor no sistema legado.
      - name: instituicaoid
        description: Identificador da instituição vinculada ao servidor.
      - name: trabalhocep
        description: CEP do endereço de trabalho do servidor, padronizado apenas com dígitos.
      - name: trabalhorua
        description: Rua ou logradouro do endereço de trabalho do servidor.
      - name: trabalhonumero
        description: Número do endereço de trabalho do servidor.
      - name: trabalhocomplemento
        description: Complemento do endereço de trabalho do servidor.
      - name: trabalhobairro
        description: Bairro do endereço de trabalho do servidor.
      - name: trabalhoufid
        description: Identificador da unidade federativa do endereço de trabalho.
      - name: trabalhomunicipioid
        description: Identificador do município do endereço de trabalho.
      - name: cargocomissaoid
        description: Identificador do cargo em comissão associado ao servidor.
      - name: ramal
        description: Ramal telefônico do servidor.

  - name: ipea_pro_statusprojetos
    description: >
      Tabela bronze com o cadastro de status de projetos do Sisbolsas.
      Funciona como dimensão de apoio para qualificar a situação dos projetos
      registrados no sistema.
    meta:
      tags:
        - bronze
    columns:
      - name: statusprojetoid
        description: Identificador único do status de projeto.
      - name: nomestatus
        description: Nome do status do projeto.
      - name: descricaostatus
        description: Descrição detalhada do status do projeto.
      - name: ativo
        description: Indica se o status de projeto está ativo no sistema.

  - name: sisbolsas_tb_area_formacao
    description: >
      Tabela bronze com o cadastro de áreas de formação utilizadas pelo
      Sisbolsas para classificar formações acadêmicas e perfis de seleção.
    meta:
      tags:
        - bronze
    columns:
      - name: co_area_formacao
        description: Código identificador registrado no campo de origem referente a `co area formacao`.
      - name: ds_area_formacao
        description: Descrição textual registrada no campo de origem referente a `ds area formacao`.

  - name: sisbolsas_tb_bolsa
    description: >
      Tabela bronze com o cadastro de bolsas vinculadas às seleções do
      Sisbolsas, incluindo situação, período de vigência e duração prevista.
    meta:
      tags:
        - bronze
    columns:
      - name: co_selecao
        description: Código identificador registrado no campo de origem referente a `co selecao`.
      - name: nu_bolsa
        description: Número registrado no campo de origem referente a `nu bolsa`.
      - name: co_situacao_bolsa
        description: Código identificador registrado no campo de origem referente a `co situacao bolsa`.
      - name: dt_inicio_bolsa
        description: Data registrada no campo de origem referente a `dt inicio bolsa`.
      - name: dt_fim_bolsa
        description: Data registrada no campo de origem referente a `dt fim bolsa`.
      - name: qt_duracao
        description: Quantidade registrada no campo de origem referente a `qt duracao`.

  - name: sisbolsas_tb_bolsa_coordenador
    description: >
      Tabela bronze com a vinculação entre bolsas e coordenadores no
      Sisbolsas, incluindo CPF, vigência e situação do vínculo.
    meta:
      tags:
        - bronze
    columns:
      - name: co_bolsa_coordenador
        description: Código identificador registrado no campo de origem referente a `co bolsa coordenador`.
      - name: co_selecao
        description: Código identificador registrado no campo de origem referente a `co selecao`.
      - name: nu_bolsa
        description: Número registrado no campo de origem referente a `nu bolsa`.
      - name: ds_cpf
        description: CPF associado ao registro, padronizado apenas com dígitos.
      - name: dt_inicio_vigencia
        description: Data registrada no campo de origem referente a `dt inicio vigencia`.
      - name: dt_fim_vigencia
        description: Data registrada no campo de origem referente a `dt fim vigencia`.
      - name: st_situacao
        description: Status registrado no campo de origem referente a `st situacao`.

  - name: sisbolsas_tb_bolsa_fonterecurso
    description: >
      Tabela bronze com a associação entre bolsas e fontes financeiras no
      Sisbolsas, registrando vigência e situação da fonte de recurso.
    meta:
      tags:
        - bronze
    columns:
      - name: co_bolsa_fonterecurso
        description: Código identificador registrado no campo de origem referente a `co bolsa fonterecurso`.
      - name: co_selecao
        description: Código identificador registrado no campo de origem referente a `co selecao`.
      - name: nu_bolsa
