version: 2

models:
  # Dados Abertos DBT

  ## Bronze
  - name: deputados
    description: >
      Tabela com informações básicas sobre deputados federais obtidas por meio da API de Dados Abertos da Câmara dos Deputados.
      Contém dados cadastrais e institucionais como identificador, nome parlamentar, partido, unidade federativa,
      legislatura e e-mail institucional.
      Esta tabela representa a camada bronze do pipeline, aplicando padronização de tipos,
      pequenas transformações e ajuste de fuso horário na data de ingestão.
      Os dados são provenientes da fonte dados_abertos.deputados (camada raw) e
      passam por conversão explícita de tipos para garantir consistência e rastreabilidade.
    meta:
      tags:
        - bronze
    columns:
      - name: id
        description: >
          Identificador único do deputado na API da Câmara.
          Utilizado como chave primária e referência para relacionamentos com outras tabelas.

      - name: nome
        description: >
          Nome parlamentar do deputado conforme registrado na Câmara dos Deputados.

      - name: siglapartido
        description: >
          Sigla do partido ao qual o deputado está filiado na legislatura informada.

      - name: siglauf
        description: >
          Sigla da Unidade Federativa (UF) que o deputado representa.

      - name: idlegislatura
        description: >
          Identificador numérico da legislatura à qual o deputado está vinculado.

      - name: urlfoto
        description: >
          URL da foto oficial do deputado disponibilizada pela Câmara dos Deputados.

      - name: email
        description: >
          Endereço de e-mail institucional do deputado na Câmara dos Deputados.

      - name: dt_ingest
        description: >
          Data e hora (UTC-3 Brasília) em que os dados foram ingeridos da fonte original para a camada raw.
    tests: 
    - verificacao_tipagem:
        nome_tabela: 'deputados.deputados'
        nome_coluna: 'id'
        tipo_esperado: 'integer'

    - verificacao_tipagem:
        nome_tabela: 'deputados.deputados'
        nome_coluna: 'nome'
        tipo_esperado: 'text'

    - verificacao_tipagem:
        nome_tabela: 'deputados.deputados'
        nome_coluna: 'siglapartido'
        tipo_esperado: 'text'

    - verificacao_tipagem:
        nome_tabela: 'deputados.deputados'
        nome_coluna: 'siglauf'
        tipo_esperado: 'text'

    - verificacao_tipagem:
        nome_tabela: 'deputados.deputados'
        nome_coluna: 'idlegislatura'
        tipo_esperado: 'integer'

    - verificacao_tipagem:
        nome_tabela: 'deputados'
        nome_coluna: 'urlfoto'
        tipo_esperado: 'text'
        
    - verificacao_tipagem:
        nome_tabela: 'deputados.deputados'
        nome_coluna: 'email'
        tipo_esperado: 'text'

    - verificacao_tipagem:
        nome_tabela: 'deputados.deputados'
        nome_coluna: 'dt_ingest'
        tipo_esperado: 'timestamp with time zone'

  - name: senadores
    description: >
      Tabela com informações básicas sobre senadores federais obtidas por meio da API de Dados Abertos do Senado Federal.
      Contém dados cadastrais e institucionais como identificador, nome parlamentar, sexo, forma de tratamento,
      partido, unidade federativa, URLs de foto e página, e e-mail institucional.
      Esta tabela representa a camada bronze do pipeline, aplicando padronização de tipos,
      pequenas transformações e ajuste de fuso horário na data de ingestão.
      Os dados são provenientes da fonte senado_federal.senadores (camada raw) e
      passam por conversão explícita de tipos para garantir consistência e rastreabilidade.
    meta:
      tags:
        - bronze
    columns:
      - name: id
        description: >
          Identificador único do senador na API do Senado Federal.
          Utilizado como chave primária e referência para relacionamentos com outras tabelas.

      - name: nome_parlamentar
        description: >
          Nome parlamentar do senador conforme registrado no Senado Federal.

      - name: sexo
        description: >
          Sexo do senador (Masculino ou Feminino).

      - name: forma_tratamento
        description: >
          Forma de tratamento do senador (ex: Senador, Senadora).

      - name: url_foto
        description: >
          URL da foto oficial do senador disponibilizada pelo Senado Federal.

      - name: url_pagina
        description: >
          URL da página de perfil do senador no portal do Senado Federal.

      - name: email
        description: >
          Endereço de e-mail institucional do senador no Senado Federal.

      - name: sigla_partido
        description: >
          Sigla do partido ao qual o senador está filiado.

      - name: uf
        description: >
          Sigla da Unidade Federativa (UF) que o senador representa.

      - name: dt_ingest
        description: >
          Data e hora (UTC-3 Brasília) em que os dados foram ingeridos da fonte original para a camada raw.

    tests: 
    - verificacao_tipagem:
        nome_tabela: 'senadores.senadores'
        nome_coluna: 'id'
        tipo_esperado: 'integer'

    - verificacao_tipagem:
        nome_tabela: 'senadores.senadores'
        nome_coluna: 'nome_parlamentar'
        tipo_esperado: 'text'

    - verificacao_tipagem:
        nome_tabela: 'senadores.senadores'
        nome_coluna: 'sexo'
        tipo_esperado: 'text'

    - verificacao_tipagem:
        nome_tabela: 'senadores.senadores'
        nome_coluna: 'forma_tratamento'
        tipo_esperado: 'text'

    - verificacao_tipagem:
        nome_tabela: 'senadores.senadores'
        nome_coluna: 'url_foto'
        tipo_esperado: 'text'

    - verificacao_tipagem:
        nome_tabela: 'senadores.senadores'
        nome_coluna: 'url_pagina'
        tipo_esperado: 'text'

    - verificacao_tipagem:
        nome_tabela: 'senadores.senadores'
        nome_coluna: 'email'
        tipo_esperado: 'text'

    - verificacao_tipagem:
        nome_tabela: 'senadores.senadores'
        nome_coluna: 'sigla_partido'
        tipo_esperado: 'text'

    - verificacao_tipagem:
        nome_tabela: 'senadores.senadores'
        nome_coluna: 'uf'
        tipo_esperado: 'text'

    - verificacao_tipagem:
        nome_tabela: 'senadores.senadores'
        nome_coluna: 'dt_ingest'
        tipo_esperado: 'timestamp with time zone'
